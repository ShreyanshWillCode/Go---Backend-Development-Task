version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: anyx_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: anyx_secret_2024
      POSTGRES_DB: anyx_db
    ports:
      - "5432:5432"
    volumes:
      # Persist data across container restarts
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go API ───────────────────────────────────────────────────────────────────
  api:
    build: .
    container_name: anyx_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgres://postgres:anyx_secret_2024@postgres:5432/anyx_db?sslmode=disable
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
